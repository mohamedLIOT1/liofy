    <!-- Splash Screen Style -->

      #splash {
        position: fixed; inset: 0; z-index: 9999;

        display: flex; flex-direction: column;

        box-shadow: 0 0 60px #1DB95466;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash h1 {
        color: #fff; font-size: 32px; font-weight: 900;
        font-family: 'Outfit', Arial, sans-serif;
        letter-spacing: -1px; margin: 0;
      }
      #splash p {
        color: #b3b3b3; font-size: 13px;
        font-family: 'Outfit', Arial, sans-serif;
        margin: 0;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 60px #1DB95466; }

  <body class="bg-black text-white antialiased select-none overflow-hidden" style="font-family:'Outfit',sans-serif">

    <!-- Splash Screen -->
    <div id="splash">
      <div class="logo">L</div>
      <h1>Liofy</h1>
      <p>Music for Everyone</p>
    </div>

    <div id="root"></div>

    <script>
      // Remove splash when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }
        }, 1200);
      });

      // Register updated Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker?.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                  window.location.reload();
                }
              });
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
